name: Build & Deploy

on:
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/hyperliquid-bot

jobs:
  build-and-deploy:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push (native ARM64)
        run: |
          docker build -t ${{ env.IMAGE }}:latest -t ${{ env.IMAGE }}:${{ github.sha }} .
          docker push ${{ env.IMAGE }}:latest
          docker push ${{ env.IMAGE }}:${{ github.sha }}

      - name: Deploy to K8s
        run: |
          kubectl -n trading set image deployment/hyperliquid-bot \
            bot=${{ env.IMAGE }}:${{ github.sha }}
          kubectl -n trading rollout status deployment/hyperliquid-bot \
            --timeout=300s
