apiVersion: v1
kind: PersistentVolume
metadata:
  name: hyperliquid-bot-pv
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteMany
  nfs:
    server: 192.168.1.100   # ← vervang met IP van je Pi A (NFS server)
    path: /data/hyperliquid-bot
  persistentVolumeReclaimPolicy: Retain
  mountOptions:
    - hard
    - nfsvers=4.1
