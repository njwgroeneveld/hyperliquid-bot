apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: hyperliquid-bot
  namespace: monitoring
  labels:
    app: hyperliquid-bot
    release: monitoring
spec:
  namespaceSelector:
    matchNames:
      - trading
  selector:
    matchLabels:
      app: hyperliquid-bot
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
